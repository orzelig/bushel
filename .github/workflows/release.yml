name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release notes pull from the right base

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Embed Virtualization entitlement
        # VZVirtualMachine refuses to instantiate without the
        # 'com.apple.security.virtualization' entitlement on the host process.
        # The Swift toolchain ad-hoc / linker-signs the binary but does not
        # attach entitlements; we have to do that here. See issue #20.
        # 'com.apple.security.hypervisor' is included for nested / Rosetta
        # support and is a strict superset of virt for our purposes.
        # Ad-hoc signing (--sign -) works without an Apple Developer account.
        run: |
          set -euo pipefail
          if [ ! -x /usr/bin/codesign ]; then
            echo "::error::/usr/bin/codesign is missing on this runner"
            exit 1
          fi
          BIN=.build/arm64-apple-macosx/release/bushel
          ENT=$(mktemp -t bushel-entitlements).plist
          cat > "$ENT" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.virtualization</key>
              <true/>
              <key>com.apple.security.hypervisor</key>
              <true/>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --sign - --entitlements "$ENT" "$BIN"
          # Verify: the entitlements must be readable from the binary now.
          /usr/bin/codesign --display --entitlements - "$BIN" 2>&1 | tee /tmp/entitlements.out
          grep -q com.apple.security.virtualization /tmp/entitlements.out || {
            echo "::error::com.apple.security.virtualization not present after codesign"
            exit 1
          }
          grep -q com.apple.security.hypervisor /tmp/entitlements.out || {
            echo "::error::com.apple.security.hypervisor not present after codesign"
            exit 1
          }
          rm -f "$ENT"

      - name: Stage tarball contents
        run: |
          set -euo pipefail
          BUILD_DIR=.build/arm64-apple-macosx/release
          STAGE=stage
          mkdir -p "$STAGE"
          # Main bushel binary
          cp "$BUILD_DIR/bushel" "$STAGE/"
          # Optional menu bar binary (built from the bushel-bar target)
          if [ -f "$BUILD_DIR/bushel-bar" ]; then
            cp "$BUILD_DIR/bushel-bar" "$STAGE/"
          else
            echo "::warning::bushel-bar missing from build output (skipped)"
          fi
          # SPM-generated resource bundle. Must ship adjacent to the binary —
          # Bundle.module resolves resources relative to the executable's
          # location, and our unattended-install presets live inside it.
          if [ -d "$BUILD_DIR/bushel_bushel.bundle" ]; then
            cp -R "$BUILD_DIR/bushel_bushel.bundle" "$STAGE/"
          else
            echo "::error::bushel_bushel.bundle missing from build output"
            exit 1
          fi
          ls -la "$STAGE"

      - name: Create tarball
        run: |
          set -euo pipefail
          # tar -C stage . produces a flat-rooted archive (no leading 'stage/').
          # Layout matches what scripts/install.sh expects.
          tar -czf bushel-darwin-arm64.tar.gz -C stage .
          ls -la bushel-darwin-arm64.tar.gz
          tar -tzf bushel-darwin-arm64.tar.gz | head -20

      - name: Compute SHA-256
        id: sha
        run: |
          shasum -a 256 bushel-darwin-arm64.tar.gz | tee bushel-darwin-arm64.tar.gz.sha256
          echo "value=$(awk '{print $1}' bushel-darwin-arm64.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          set -euo pipefail
          # If the release already exists (rare; usually a re-tag), just
          # upload the asset. Otherwise create it with auto-generated notes.
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading asset."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --notes "$(cat <<EOF
            **bushel $TAG** — Apple Silicon (arm64) macOS

            ## Install

            \`\`\`
            /bin/bash -c "\$(curl -fsSL https://raw.githubusercontent.com/orzelig/bushel/main/scripts/install.sh)"
            \`\`\`

            See [README.md](https://github.com/orzelig/bushel/blob/main/README.md) for usage and [UPSTREAM-STATUS.md](https://github.com/orzelig/bushel/blob/main/UPSTREAM-STATUS.md) for the relationship to upstream lume.

            ## Asset

            \`bushel-darwin-arm64.tar.gz\` — sha256: \`$SHA\`
            EOF
            )"
          fi
          gh release upload "$TAG" \
            bushel-darwin-arm64.tar.gz \
            bushel-darwin-arm64.tar.gz.sha256 \
            --clobber
